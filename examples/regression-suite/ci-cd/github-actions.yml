# TraceTap API Regression Tests - GitHub Actions Workflow
# Copy this file to .github/workflows/api-regression.yml

name: API Regression Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'

env:
  API_URL: ${{ vars.API_URL || 'http://localhost:3000' }}

jobs:
  regression-tests:
    name: Run API Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/regression-suite/generated-tests/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install TraceTap
        run: pip install -e .

      - name: Install Playwright dependencies
        working-directory: examples/regression-suite/generated-tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start API Server
        run: |
          # Replace with your actual API startup command
          python examples/regression-suite/sample-api/server.py &
          sleep 5

          # Health check
          curl -f http://localhost:3000/health || exit 1

      - name: Run Regression Tests
        working-directory: examples/regression-suite/generated-tests
        run: npx playwright test
        env:
          API_URL: http://localhost:3000

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            examples/regression-suite/generated-tests/test-results.json
            examples/regression-suite/generated-tests/playwright-report/
          retention-days: 30

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: examples/regression-suite/generated-tests/playwright-report/
          retention-days: 7

  contract-verification:
    name: Verify API Contract
    runs-on: ubuntu-latest
    needs: regression-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install TraceTap
        run: pip install -e .

      - name: Start API Server
        run: |
          python examples/regression-suite/sample-api/server.py &
          sleep 5

      - name: Capture Current Traffic
        run: |
          python tracetap.py --listen 8080 \
            --raw-log current-traffic.json \
            --session "ci-capture" &
          PROXY_PID=$!
          sleep 2

          # Run test requests through proxy
          export HTTP_PROXY=http://localhost:8080
          curl -x $HTTP_PROXY http://localhost:3000/users
          curl -x $HTTP_PROXY -X POST http://localhost:3000/users \
            -H "Content-Type: application/json" \
            -d '{"name":"CI Test","email":"ci@test.com","role":"user"}'

          kill $PROXY_PID || true
          sleep 1

      - name: Generate Current Contract
        run: |
          python tracetap-replay.py create-contract \
            current-traffic.json \
            -o current-contract.yaml \
            --title "API" --version "current"

      - name: Verify Contract Compatibility
        run: |
          python tracetap-replay.py verify-contract \
            examples/regression-suite/baseline/contract.yaml \
            current-contract.yaml \
            --fail-on-breaking
        continue-on-error: true

      - name: Report Contract Changes
        if: failure()
        run: |
          echo "::warning::Breaking API changes detected!"
          python tracetap-replay.py verify-contract \
            examples/regression-suite/baseline/contract.yaml \
            current-contract.yaml \
            --format markdown > contract-diff.md
          cat contract-diff.md

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [regression-tests, contract-verification]
    if: failure()

    steps:
      - name: Send Notification
        run: |
          echo "::error::API regression tests failed!"
          # Add your notification logic here (Slack, email, etc.)
