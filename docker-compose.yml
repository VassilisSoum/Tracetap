version: '3.8'

services:
  tracetap:
    build:
      context: .
      dockerfile: Dockerfile
    image: tracetap/tracetap:latest
    container_name: tracetap
    ports:
      - "8080:8080"  # Proxy port
      - "8081:8081"  # Mock server port (optional)
    volumes:
      # Persistent storage for certificates and captures
      - tracetap-data:/data
      - ./captures:/captures
    environment:
      # Set your Anthropic API key for AI features
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Optional: customize mitmproxy config location
      - MITMPROXY_CONFDIR=/data/.mitmproxy
    # Override default command for capture
    command: >
      python tracetap.py
      --listen 8080
      --raw-log /captures/capture.json
      --export /captures/collection.json
    networks:
      - tracetap-net
    restart: unless-stopped

  # Example: TraceTap Replay Service
  tracetap-replay:
    build:
      context: .
      dockerfile: Dockerfile
    image: tracetap/tracetap:latest
    container_name: tracetap-replay
    volumes:
      - ./captures:/captures
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    command: >
      python tracetap-replay.py
      /captures/capture.json
      --target http://your-api:3000
      --workers 5
    networks:
      - tracetap-net
    profiles:
      - replay
    restart: "no"

  # Example: TraceTap Mock Server
  tracetap-mock:
    build:
      context: .
      dockerfile: Dockerfile
    image: tracetap/tracetap:latest
    container_name: tracetap-mock
    ports:
      - "9000:9000"
    volumes:
      - ./captures:/captures
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    command: >
      python tracetap-replay.py
      /captures/capture.json
      --mock-server
      --mock-port 9000
      --mock-mode intelligent
    networks:
      - tracetap-net
    profiles:
      - mock
    restart: unless-stopped

networks:
  tracetap-net:
    driver: bridge

volumes:
  tracetap-data:
    driver: local
